<svg width="600" height="50" viewBox="0 0 600 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-size: 20px;
        font-weight: 600;
        fill: #a78bfa;
        dominant-baseline: middle;
      }
      .cursor {
        fill: #a78bfa;
        animation: blink 0.75s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      /* Each line fades in and out in sequence */
      .line { opacity: 0; }

      .l1 { animation: cycle 16s linear infinite 0s;    }
      .l2 { animation: cycle 16s linear infinite 4s;    }
      .l3 { animation: cycle 16s linear infinite 8s;    }
      .l4 { animation: cycle 16s linear infinite 12s;   }

      @keyframes cycle {
        0%   { opacity: 0; }
        5%   { opacity: 1; }
        20%  { opacity: 1; }
        25%  { opacity: 0; }
        100% { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="600" height="50" fill="transparent"/>

  <text x="50%" y="50%" text-anchor="middle" class="line l1">Building Galaxies from Scratch 🌌</text>
  <text x="50%" y="50%" text-anchor="middle" class="line l2">Antonio Guedes</text>
  <text x="50%" y="50%" text-anchor="middle" class="line l3">I'm going to become a Software Architect</text>
  <text x="50%" y="50%" text-anchor="middle" class="line l4">That's my Coding Way 🥷💻</text>

  <!-- blinking cursor anchored right of center estimate -->
  <rect class="cursor" x="302" y="17" width="2" height="16"/>
</svg>
